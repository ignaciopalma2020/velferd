  <circle cx="100" cy="100" r="75" stroke="#8A9A5B" stroke-width="2" />
  
  <!-- Runes Circle Simulation -->
  <text font-family="Segoe UI Symbol, Code2000, sans-serif" font-size="12" fill="#5D4037">
